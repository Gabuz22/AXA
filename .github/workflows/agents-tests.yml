name: agents-tests

# Agent Tests adversariaux (LLM, quota gratuit). 2x/semaine, horaire décalé.
# Planifié seulement si AGENTS_ENABLED == 'true'.
on:
  schedule:
    - cron: "41 4 * * 2,5"
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Exécuter en dry-run (aucun commit)"
        type: boolean
        default: true

jobs:
  tests:
    uses: ./.github/workflows/_agents-run.yml
    with:
      agent: adversarial-tests
      force_dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dry_run || false }}
    secrets: inherit
