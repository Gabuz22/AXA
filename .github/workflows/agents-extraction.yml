name: agents-extraction

# Agent Extraction CG (LLM, quota gratuit). 3x/semaine, horaire décalé. Nécessite un secret fournisseur ;
# sinon l'agent s'arrête proprement (aucune proposition). Planifié seulement si AGENTS_ENABLED == 'true'.
on:
  schedule:
    - cron: "23 3 * * 1,3,5"
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Exécuter en dry-run (aucun commit)"
        type: boolean
        default: true

jobs:
  extraction:
    uses: ./.github/workflows/_agents-run.yml
    with:
      agent: extraction-cg
      force_dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dry_run || false }}
    secrets: inherit
