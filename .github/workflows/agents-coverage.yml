name: agents-coverage

# Agent Couverture documentaire (déterministe, sans API). 2x/semaine, horaire décalé.
# Planifié seulement si AGENTS_ENABLED == 'true'.
on:
  schedule:
    - cron: "29 4 * * 1,4"
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Exécuter en dry-run (aucun commit)"
        type: boolean
        default: true

jobs:
  coverage:
    uses: ./.github/workflows/_agents-run.yml
    with:
      agent: coverage-gaps
      force_dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dry_run || false }}
    secrets: inherit
