name: agents-concepts

# Agent Concepts et relations (LLM). DÉSACTIVÉ par défaut : lancement manuel uniquement.
# Pour l'activer : décommenter schedule ET mettre AGENTS_ENABLED='true'.
on:
  # schedule:
  #   - cron: "37 6 * * 4"
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Exécuter en dry-run (aucun commit)"
        type: boolean
        default: true

jobs:
  concepts:
    uses: ./.github/workflows/_agents-run.yml
    with:
      agent: concepts
      force_dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dry_run || false }}
    secrets: inherit
