name: agents-coordinator

# Coordinateur (déterministe) : agrège les propositions et régénère READY_FOR_REVIEW pour Claude.
# Quotidien, APRÈS les autres agents. Planifié seulement si AGENTS_ENABLED == 'true'.
on:
  schedule:
    - cron: "9 8 * * *"
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Exécuter en dry-run (aucun commit)"
        type: boolean
        default: true

jobs:
  coordinator:
    uses: ./.github/workflows/_agents-run.yml
    with:
      mode: coordinator
      force_dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dry_run || false }}
    secrets: inherit
