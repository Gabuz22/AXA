<body>
<h1>Tests du moteur de recherche (dÃĐterministes, sans framework)</h1>
<p>Servir la racine du dÃĐpÃīt puis ouvrir <code>/app/test_recherche.html</code>.
Le rÃĐsultat global s'affiche aussi dans le titre de l'onglet (lisible en headless :

<ul id="out"><li>ExÃĐcutionâĶ</li></ul>
<script type="module">
// MÃŠmes chemins relatifs que l'app rÃĐelle (page au niveau de app/index.html).
import { searchAll, clearSearchIndex } from "./services/axaKnowledge.js";

const out = document.getElementById("out");
const results = [];
function check(nom, cond, detail) {
  results.push({ nom, ok: !!cond, detail });
}
const contratsDistincts = hits => new Set(hits.map(h => h.contrat).filter(Boolean)).size;

async function run() {
  clearSearchIndex();

  // 1. RÃĐsultat clairement pertinent : le 1er n'est PAS marquÃĐ faible et le type attendu sort.
  let r = await searchAll("dÃĐlai de carence");
  check("pertinent â ÂŦ dÃĐlai de carence Âŧ : des rÃĐsultats", r.length > 0, `${r.length} rÃĐsultats`);
  check("pertinent â 1er rÃĐsultat non faible", r[0] && !r[0].faible, `couverture=${r[0]?.couverture?.toFixed(2)}`);
  check("pertinent â une dÃĐfinition dans les 3 premiers", r.slice(0, 3).some(h => h.type === "dÃĐfinition" || /d[ÃĐe]finition/.test(h.type)), r.slice(0, 3).map(h => h.type).join(", "));

  // 2. RÃĐsultat faible : requÃŠte hors pÃĐrimÃĻtre Ã  faible recoupement lexical.
  r = await searchAll("dÃĐgÃĒt des eaux appartement");
  check("faible â ÂŦ dÃĐgÃĒt des eaux appartement Âŧ : 1er marquÃĐ faible (ou aucun rÃĐsultat)",
    r.length === 0 || r[0].faible, r[0] ? `couverture=${r[0].couverture?.toFixed(2)}` : "0 rÃĐsultat");

  r = await searchAll("assurance auto voiture tiers");
  check("faible â ÂŦ assurance auto voiture tiers Âŧ : 1er marquÃĐ faible (ou aucun)",
    r.length === 0 || r[0].faible, r[0] ? `couverture=${r[0].couverture?.toFixed(2)}` : "0 rÃĐsultat");

  // 3. Aucune correspondance : requÃŠte absurde (tokens inexistants dans le corpus ET hors
  //    synonymes) â zÃĐro rÃĐsultat, jamais d'invention.
  r = await searchAll("xyzabc qwerty zgloubi wxcvbn");
  check("aucune â requÃŠte absurde : 0 rÃĐsultat", r.length === 0, `${r.length} rÃĐsultats`);

  // 4. Recherche transversale : ÂŦ rachat Âŧ touche plusieurs contrats distincts.
  r = await searchAll("rachat");
  check("transversale â ÂŦ rachat Âŧ : âĨ 3 contrats distincts", contratsDistincts(r) >= 3, `${contratsDistincts(r)} contrats`);
  check("transversale â 1er rÃĐsultat non faible", r[0] && !r[0].faible, `couverture=${r[0]?.couverture?.toFixed(2)}`);

  // 5. Recherche ambiguÃŦ : mot gÃĐnÃĐrique unique â beaucoup de rÃĐsultats, 1er non faible
  //    (le terme saisi EST couvert ; l'ambiguÃŊtÃĐ se gÃĻre par les filtres, pas par un faux doute).
  r = await searchAll("capital");
  check("ambiguÃŦ â ÂŦ capital Âŧ : nombreux rÃĐsultats", r.length >= 20, `${r.length} rÃĐsultats`);
  check("ambiguÃŦ â 1er rÃĐsultat non faible", r[0] && !r[0].faible, `couverture=${r[0]?.couverture?.toFixed(2)}`);

  // 6. Synonymes : ÂŦ carence Âŧ seul doit trouver via ÂŦ attente Âŧ et rester couvert (non faible).
  r = await searchAll("carence");
  check("synonymes â ÂŦ carence Âŧ : des rÃĐsultats (via dÃĐlai/attente)", r.length > 0, `${r.length} rÃĐsultats`);
  check("synonymes â 1er rÃĐsultat non faible (couvert par synonyme)", r[0] && !r[0].faible, `couverture=${r[0]?.couverture?.toFixed(2)}`);

  // 7a. Faute lÃĐgÃĻre d'accent : la normalisation la neutralise entiÃĻrement.
  r = await searchAll("exclusions dÃĐcÃĐs");
  check("faute d'accent â ÂŦ dÃĐcÃĐs Âŧ : rÃĐsultats et 1er non faible", r.length > 0 && !r[0].faible, r[0] ? `couverture=${r[0].couverture?.toFixed(2)}` : "0 rÃĐsultat");

  // 7b. Faute de consonne : ÂŦ carrence Âŧ n'existe pas dans le corpus â si un contrat citÃĐ sort
  //     quand mÃŠme (ÂŦ avizen Âŧ matchÃĐ), il doit ÃŠtre marquÃĐ faible â honnÃŠte, pas de fausse confiance.
  r = await searchAll("carrence avizen");
  check("faute de consonne â ÂŦ carrence avizen Âŧ : 1er marquÃĐ faible (ou aucun)",
    r.length === 0 || r[0].faible, r[0] ? `couverture=${r[0].couverture?.toFixed(2)}` : "0 rÃĐsultat");

  // 8. Non-rÃĐgression : ÂŦ rachat possible ? Âŧ (exemple proposÃĐ sur l'accueil) ne doit PAS ÃŠtre
  //    marquÃĐ faible â le mot utile est couvert, le mot d'appoint ne pÃĻse pas assez pour douter.
  r = await searchAll("rachat possible ?");
  check("non-rÃĐgression â exemple d'accueil ÂŦ rachat possible ? Âŧ non faible", r[0] && !r[0].faible, `couverture=${r[0]?.couverture?.toFixed(2)}`);

  const ok = results.filter(x => x.ok).length;
  out.innerHTML = results.map(x =>
    `<li class="${x.ok ? "ok" : "ko"}">${x.ok ? "â" : "â"} ${x.nom} <span style="opacity:.6">(${x.detail || ""})</span></li>`).join("");
  const verdict = `${ok}/${results.length} ${ok === results.length ? "OK" : "ÃCHEC"}`;
  document.title = `Tests recherche : ${verdict}`;
  out.insertAdjacentHTML("beforeend", `<li><b id="verdict">${verdict}</b></li>`);
}
run().catch(e => { out.innerHTML = `<li class="ko">ERREUR : ${e.message}</li>`; document.title = "Tests recherche : ERREUR"; });
</script>
